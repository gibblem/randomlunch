<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c62828" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Lunch Spin" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Lunch Spin</title>
  <style>
    :root{--red:#c62828;--cream:#fff7e8;--gold:#ffc84d;--dark:#181818}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#fff2cf,var(--cream));color:var(--dark)}
    body{display:flex;align-items:center;justify-content:center;padding:env(safe-area-inset-top) 18px env(safe-area-inset-bottom)}
    .app{width:100%;max-width:430px;min-height:88vh;background:white;border-radius:34px;padding:28px 20px;box-shadow:0 18px 45px rgba(0,0,0,.18);border:4px solid var(--red);display:flex;flex-direction:column;justify-content:space-between;text-align:center}
    h1{font-size:3.1rem;margin:0;color:var(--red);line-height:.9;text-transform:uppercase}
    .sub{font-weight:900;margin-top:8px}
    .plate{margin:28px 0;padding:28px 16px;min-height:245px;border-radius:28px;background:linear-gradient(#fffefa,#ffe4ad);border:3px dashed var(--gold);display:flex;align-items:center;justify-content:center;flex-direction:column}
    .label{font-size:.78rem;letter-spacing:2px;text-transform:uppercase;color:#777;font-weight:900;margin-bottom:10px}
    #result{font-size:2.35rem;font-weight:1000;line-height:1.05}
    #category{margin-top:12px;color:var(--red);font-weight:900;font-size:1.05rem}
    button{width:100%;border:0;background:var(--red);color:white;border-radius:999px;padding:20px;font-size:1.45rem;font-weight:1000;box-shadow:0 8px 0 #8b1717}
    button:active{transform:translateY(5px);box-shadow:0 3px 0 #8b1717}
    .hint{font-size:.83rem;color:#777;margin-top:18px;line-height:1.35}
  </style>
</head>
<body>
  <main class="app">
    <div>
      <h1>Lunch<br>Spin</h1>
      <div class="sub">Two Cousins Random Picker</div>
    </div>

    <section class="plate" aria-live="polite">
      <div class="label">Today’s Pick</div>
      <div id="result">Tap Spin</div>
      <div id="category"></div>
    </section>

    <div>
      <button onclick="spin()">🍕 Spin Again</button>
      <div class="hint">iPhone: open in Safari → Share → Add to Home Screen</div>
    </div>
  </main>

  <script>
    const lunches = [
      ["Plain Cheese Mini Round Pizza","Mini Round Pizza"],
      ["Pepperoni Mini Round Pizza","Mini Round Pizza"],
      ["Meat Lovers Mini Round Pizza","Mini Round Pizza"],
      ["Chef Salad","Small Salad"],
      ["Taco Salad","Small Salad"],
      ["Chicken Caesar Salad","Small Salad"],
      ["Turkey Mini Sub","Mini Sub"],
      ["Ham & Cheese Mini Sub","Mini Sub"],
      ["Italian Mini Sub","Mini Sub"],
      ["Tuna Salad Mini Sub","Mini Sub"],
      ["Ham & Cheese Mini Stromboli","Mini Stromboli"],
      ["Pepperoni Mini Stromboli","Mini Stromboli"],
      ["Buffalo Chicken Mini Stromboli","Mini Stromboli"],
      ["Ham Calzone","Mini Stromboli"],
      ["Lasagna","Pasta"],
      ["Penne w/ Alfredo + 2 Meatballs","Pasta"],
      ["Chicken Quesadilla","Quesadilla"],
      ["Cheese Steak Quesadilla","Quesadilla"],
      ["Turkey Wrap","Wrap"],
      ["Fried Chicken Ranch Wrap","Wrap"],
      ["Buffalo Fried Chicken Wrap","Wrap"],
      ["Chef Salad + Mini Turkey Sub","Combo"],
      ["Chicken Caesar Salad + Mini Ham & Cheese Sub","Combo"],
      ["Mozzarella Sticks + Cheeseburger","Combo"],
      ["Chef Salad + BLT","Combo"]
    ];

    function spin(){
      const result=document.getElementById("result");
      const category=document.getElementById("category");
      let count=0;
      const timer=setInterval(()=>{
        const pick=lunches[Math.floor(Math.random()*lunches.length)];
        result.textContent=pick[0];
        category.textContent=pick[1];
        count++;
        if(count>18){clearInterval(timer); localStorage.setItem("lastLunch", JSON.stringify(pick));}
      },65);
    }

    const last = localStorage.getItem("lastLunch");
    if(last){
      const pick=JSON.parse(last);
      document.getElementById("result").textContent=pick[0];
      document.getElementById("category").textContent=pick[1];
    }

    if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js"); }
  </script>
</body>
</html>
